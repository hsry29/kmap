<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="KMap — Seoul Travel Map for international visitors. Currently in development."
    />
    <meta name="theme-color" content="#08080f" />
    <title>KMap — Seoul Travel Map</title>
    <link rel="stylesheet" href="/landing.css" />
  </head>
  <body>
    <main class="landing" aria-labelledby="landing-title">
      <div class="landing__glow" aria-hidden="true"></div>
      <div class="landing__card">
        <img class="landing__logo" src="/favicon.svg" width="72" height="72" alt="" />
        <h1 class="landing__title" id="landing-title">KMap</h1>
        <p class="landing__tagline">Seoul Travel Map</p>
        <hr class="landing__divider" />
        <p class="landing__status">Currently in development</p>
        <p class="landing__badge">Coming soon</p>
      </div>
      <p class="landing__footer">&copy; KMap</p>
    </main>
  </body>
</html>
